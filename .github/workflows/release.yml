name: release

# Valide la construction des images Docker (api JVM + web nginx) sur les PR.
# Le build + push + déploiement sur main est géré par cd.yml.
on:
  pull_request:
    paths:
      - 'apps/api/**'
      - 'apps/web/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/release.yml'

jobs:
  images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: api
            context: apps/api
            file: apps/api/src/main/docker/Dockerfile.jvm
          - name: web
            context: .
            file: apps/web/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name
        id: img
        run: echo "repo=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/librarius-${{ matrix.name }}" >> "$GITHUB_OUTPUT"

      - name: Build & (push)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ steps.img.outputs.repo }}:latest
            ${{ steps.img.outputs.repo }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
