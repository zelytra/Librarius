name: openapi-sync

# Garantit que le schéma OpenAPI commité et le client TS généré sont à jour
# vis-à-vis du code de l'API. Échoue si un `pnpm gen:api` aurait produit un diff.
on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/api/**'
      - 'apps/web/openapi/**'
      - 'apps/web/orval.config.ts'
      - 'apps/web/src/api/**'
      - '.github/workflows/openapi-sync.yml'
  pull_request:
    paths:
      - 'apps/api/**'
      - 'apps/web/openapi/**'
      - 'apps/web/orval.config.ts'
      - 'apps/web/src/api/**'
      - '.github/workflows/openapi-sync.yml'

jobs:
  sync:
    name: schema & client up-to-date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Regenerate OpenAPI schema from the API
        working-directory: apps/api
        run: ./mvnw -q -B -ntp -DskipTests package

      - name: Install web dependencies
        run: pnpm install --frozen-lockfile

      - name: Regenerate TypeScript client
        run: pnpm --filter @librarius/web gen:api

      - name: Fail on drift
        run: |
          if ! git diff --exit-code -- apps/web/openapi apps/web/src/api/generated; then
            echo "::error::Le schéma OpenAPI ou le client TS sont périmés. Lancez 'pnpm --filter @librarius/web gen:api' (après build de l'API) et committez."
            exit 1
          fi
