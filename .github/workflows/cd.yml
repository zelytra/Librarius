name: cd

# Sur push main : build + push des images vers GHCR, puis déploiement Helm de la
# PWA sur le cluster Kubernetes (book.zelytra.fr) via le secret KUBECONFIG.
on:
  push:
    branches: [main]

jobs:
  build:
    name: build & push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: api
            context: apps/api
            file: apps/api/src/main/docker/Dockerfile.jvm
          - name: web
            context: .
            file: apps/web/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          # Le web embarque l'autorité OIDC publique au build (ignoré par l'api).
          build-args: |
            VITE_OIDC_AUTHORITY=https://librarius.zelytra.fr/auth/realms/librarius
          tags: |
            ghcr.io/zelytra/librarius-${{ matrix.name }}:latest
            ghcr.io/zelytra/librarius-${{ matrix.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: helm deploy (book.zelytra.fr)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.0

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kube access
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBECONFIG }}" > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Create GHCR pull secret
        run: |
          kubectl create secret docker-registry ghcr-pull \
            --namespace default \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.GITHUB_TOKEN }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Helm upgrade --install
        run: |
          helm upgrade --install librarius ./helm/librarius \
            --namespace default \
            --set web.image.tag=${{ github.sha }} \
            --set api.image.tag=${{ github.sha }} \
            --wait --timeout 8m

      - name: Verify rollout
        run: |
          kubectl -n default rollout status deployment/librarius-web --timeout=180s
          kubectl -n default rollout status deployment/librarius-api --timeout=240s
          kubectl -n default get pods,ingress -l release=librarius
