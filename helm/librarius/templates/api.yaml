{{- if .Values.api.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-api
  labels:
    {{- include "librarius.labels" (dict "ctx" . "component" "api") | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicas }}
  # Recreate : remplace en place sans pod « surge » (nœud contraint en CPU).
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "librarius.selector" (dict "ctx" . "component" "api") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "librarius.selector" (dict "ctx" . "component" "api") | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - containerPort: 8080
          env:
            - name: QUARKUS_HTTP_HOST
              value: "0.0.0.0"
            - name: QUARKUS_DATASOURCE_JDBC_URL
              value: "jdbc:postgresql://{{ .Release.Name }}-postgres:5432/{{ .Values.postgres.database }}"
            - name: QUARKUS_DATASOURCE_USERNAME
              value: {{ .Values.postgres.user | quote }}
            - name: QUARKUS_DATASOURCE_PASSWORD
              value: {{ .Values.postgres.password | quote }}
            # Discovery + backchannel internes ; l'issuer reste l'URL publique
            # (KC_HOSTNAME + backchannel dynamique côté Keycloak).
            - name: OIDC_AUTH_SERVER_URL
              value: "http://{{ .Release.Name }}-keycloak:8081/auth/realms/librarius"
          readinessProbe:
            httpGet: { port: 8080, path: /q/health/ready }
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet: { port: 8080, path: /q/health/live }
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-api
  labels:
    {{- include "librarius.labels" (dict "ctx" . "component" "api") | nindent 4 }}
spec:
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  selector:
    {{- include "librarius.selector" (dict "ctx" . "component" "api") | nindent 4 }}
{{- end }}
