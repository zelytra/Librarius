apiVersion: v1
kind: Service
metadata:
  name: {{ include "librarius.fullname" . }}
  labels:
    {{- include "librarius.labels" . | nindent 4 }}
spec:
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: 80
      protocol: TCP
  selector:
    app: {{ include "librarius.fullname" . }}
    release: {{ .Release.Name }}
