## Ma Bibliothèque (Librarius) — stack complète sur Kubernetes.
## Hôte unique : librarius.zelytra.fr (web), /api + /q → api, /auth → keycloak.

domain: librarius.zelytra.fr

imagePullSecrets:
  - name: ghcr-pull

ingress:
  enabled: true
  className: traefik
  clusterIssuer: letsencrypt-prod
  tlsSecretName: librarius-zelytra-fr-tls

# ── Frontend (PWA) ────────────────────────────────────────────────────────────
web:
  image:
    repository: ghcr.io/zelytra/librarius-web
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  replicas: 1
  resources:
    requests: { cpu: 50m, memory: 64Mi }
    limits: { cpu: 200m, memory: 192Mi }

# ── API (Quarkus) ─────────────────────────────────────────────────────────────
api:
  enabled: true
  image:
    repository: ghcr.io/zelytra/librarius-api
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  replicas: 1
  resources:
    requests: { cpu: 150m, memory: 256Mi }
    limits: { cpu: "1", memory: 768Mi }

# ── PostgreSQL ────────────────────────────────────────────────────────────────
postgres:
  enabled: true
  image: postgres:16-alpine
  user: librarius
  password: librarius
  database: librarius
  storage: 2Gi
  resources:
    requests: { cpu: 50m, memory: 128Mi }
    limits: { cpu: 500m, memory: 512Mi }

# ── Keycloak (auth) ───────────────────────────────────────────────────────────
keycloak:
  enabled: true
  image: quay.io/keycloak/keycloak:25.0.6
  admin: admin
  adminPassword: admin
  database: keycloak
  resources:
    requests: { cpu: 100m, memory: 384Mi }
    limits: { cpu: "1", memory: 768Mi }
