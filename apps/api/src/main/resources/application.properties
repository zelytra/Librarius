# ── Librarius API — configuration ─────────────────────────────────────────────
quarkus.application.name=librarius-api
quarkus.http.port=8080

# CORS (front PWA en dev sur Vite :5173)
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:5173
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS

# Health exposé sous /q/health (défaut Quarkus)
quarkus.smallrye-health.root-path=/q/health

# ── OpenAPI ───────────────────────────────────────────────────────────────────
quarkus.smallrye-openapi.info-title=Librarius API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=API de Ma Bibliothèque (Librarius)
# Écrit openapi.json/.yaml à la construction (consommé par orval pour le client TS).
quarkus.smallrye-openapi.store-schema-directory=../../apps/web/openapi
# Swagger UI accessible aussi en prod sous /q/swagger-ui.
quarkus.swagger-ui.always-include=true

# ── Persistence ───────────────────────────────────────────────────────────────
quarkus.datasource.db-kind=postgresql
# Flyway possède le schéma ; Hibernate se contente de le valider.
quarkus.hibernate-orm.database.generation=validate
quarkus.flyway.migrate-at-start=true

# Dev : se branche sur le PostgreSQL du docker-compose (données persistantes).
%dev.quarkus.datasource.username=librarius
%dev.quarkus.datasource.password=librarius
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/librarius
# En test, aucune URL n'est fournie : Quarkus Dev Services démarre un PostgreSQL éphémère.

# ── Auth (OIDC / Keycloak) ────────────────────────────────────────────────────
# En dev et en test, Quarkus Dev Services démarre Keycloak et configure
# automatiquement auth-server-url. En prod, fournir les variables d'environnement.
quarkus.oidc.application-type=service
%prod.quarkus.oidc.auth-server-url=${OIDC_AUTH_SERVER_URL:http://localhost:8081/realms/librarius}
%prod.quarkus.oidc.client-id=${OIDC_CLIENT_ID:librarius-api}

# En dev, l'API valide les jetons émis par le Keycloak du docker-compose
# (port fixe 8081, realm importé). Lancer `pnpm infra:up` au préalable.
%dev.quarkus.oidc.auth-server-url=http://localhost:8081/realms/librarius

# En test (aucune URL ci-dessus), Quarkus Dev Services démarre un Keycloak
# éphémère avec deux utilisateurs alice/bob pour les tests d'intégration.
%test.quarkus.keycloak.devservices.realm-name=librarius
%test.quarkus.keycloak.devservices.users.alice=alice
%test.quarkus.keycloak.devservices.users.bob=bob
%test.quarkus.keycloak.devservices.roles.alice=user
%test.quarkus.keycloak.devservices.roles.bob=user

# ── Catalogue externe ─────────────────────────────────────────────────────────
quarkus.rest-client.anilist.url=https://graphql.anilist.co
quarkus.rest-client.googlebooks.url=https://www.googleapis.com/books/v1
# Clé API Google Books optionnelle (sinon quota anonyme, vite épuisé).
librarius.googlebooks.api-key=${GOOGLE_BOOKS_API_KEY:}
# Cache des recherches catalogue (limite la pression sur les API externes).
quarkus.cache.caffeine."catalog-search".expire-after-write=6H
quarkus.cache.caffeine."catalog-search".maximum-size=500
quarkus.cache.caffeine."catalog-upcoming".expire-after-write=12H
quarkus.cache.caffeine."catalog-upcoming".maximum-size=50
