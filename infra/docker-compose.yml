# Stack de développement local de Ma Bibliothèque (Librarius).
# PR #1 : uniquement PostgreSQL. Keycloak / Prometheus / Grafana seront ajoutés
# dans les PR backend-auth (#2) et monitoring (#9).
services:
  postgres:
    image: postgres:16-alpine
    container_name: librarius-postgres
    environment:
      POSTGRES_USER: librarius
      POSTGRES_PASSWORD: librarius
      POSTGRES_DB: librarius
    ports:
      - '5432:5432'
    volumes:
      - librarius-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U librarius -d librarius']
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:25.0.6
    container_name: librarius-keycloak
    command: ['start-dev', '--import-realm', '--http-port=8081']
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - '8081:8081'
    volumes:
      - ./keycloak:/opt/keycloak/data/import:ro

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: librarius-prometheus
    command: ['--config.file=/etc/prometheus/prometheus.yml']
    ports:
      - '9090:9090'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    extra_hosts:
      - 'host.docker.internal:host-gateway'

  grafana:
    image: grafana/grafana:11.1.0
    container_name: librarius-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: 'true'
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    ports:
      - '3000:3000'
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

volumes:
  librarius-pgdata:
